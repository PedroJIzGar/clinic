spring.application.name=app
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/clinic
spring.datasource.username=clinic
spring.datasource.password=clinic

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

logging.level.org.hibernate.SQL=warn

spring.jpa.open-in-view=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

app.invitations.tokenSecret=${APP_INVITATIONS_TOKEN_SECRET:dev_super_secret_change_me_please_1234567890}

app.invitations.dev-mail.output-dir=dev-mails
app.invitations.dev-mail.log-full-link=false

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId}] [%X{uid}] [%X{email}] [%X{role}] %logger{36} - %msg%n