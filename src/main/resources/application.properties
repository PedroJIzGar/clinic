spring.application.name=app
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/clinic
spring.datasource.username=clinic
spring.datasource.password=clinic

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

logging.level.org.hibernate.SQL=warn

spring.jpa.open-in-view=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

app.invitation.token.secret=${INVITATIONS_TOKEN_SECRET}
app.invitation.ttlHours=168
app.invitation.resendCooldownSeconds=30

spring.profiles.active=dev
app.baseUrl=http://localhost:8080